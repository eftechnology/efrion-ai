services:

  # ── Traefik reverse proxy ────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - web

  # ── Next.js website (ai.efrion.com) ─────────────────────────────────────────
  website:
    build:
      context: ./website
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_GA_ID=${GA_MEASUREMENT_ID}
        - NEXT_PUBLIC_TURNSTILE_SITE_KEY=${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    environment:
      - NODE_ENV=production
      - DEMO_USERNAME=${DEMO_USERNAME}
      - DEMO_PASSWORD=${DEMO_PASSWORD}
      - SESSION_TOKEN=${SESSION_TOKEN}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - NOTIFY_EMAIL=${NOTIFY_EMAIL:-hello@efrion.com}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
    labels:
      - traefik.enable=true
      - traefik.http.routers.website.rule=Host(`ai.efrion.com`)
      - traefik.http.routers.website.entrypoints=websecure
      - traefik.http.routers.website.tls.certresolver=letsencrypt
      - traefik.http.services.website.loadbalancer.server.port=3000
    networks:
      - web

  # ── FastAPI backend (ai-api.efrion.com) ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ENABLE_SAFETY_LOCK=${ENABLE_SAFETY_LOCK:-false}
    labels:
      - traefik.enable=true
      # HTTP + WebSocket traffic
      - traefik.http.routers.backend.rule=Host(`ai-api.efrion.com`)
      - traefik.http.routers.backend.entrypoints=websecure
      - traefik.http.routers.backend.tls.certresolver=letsencrypt
      - traefik.http.services.backend.loadbalancer.server.port=8000
    networks:
      - web

networks:
  web:
    external: false

volumes:
  letsencrypt:
