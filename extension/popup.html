<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ERP AI Autopilot</title>
  <style>
    body {
      width: 250px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center;
    }
    h3 { margin-top: 0; color: #333; }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      transition: background-color 0.2s;
    }
    #startBtn { background-color: #4CAF50; color: white; }
    #startBtn:hover { background-color: #45a049; }
    #stopBtn { background-color: #f44336; color: white; }
    #stopBtn:hover { background-color: #da190b; }
    button:disabled { background-color: #cccccc; cursor: not-allowed; }
    #status {
      margin-top: 15px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <h3>ERP Autopilot 🤖</h3>
  <button id="startBtn">Start Copilot</button>
  <button id="stopBtn" disabled>Stop</button>
  <div id="status">Status: Disconnected</div>
  <script src="popup.js"></script>
</body>
</html>
