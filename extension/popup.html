<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ERP AI Autopilot</title>
  <style>
    body {
      width: 250px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center;
      background-color: #f9fafb;
    }
    h3 { margin-top: 0; color: #333; margin-bottom: 5px; }
    p.subtitle { font-size: 12px; color: #666; margin-top: 0; margin-bottom: 15px; }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      transition: all 0.2s;
    }
    #startBtn { background-color: #4CAF50; color: white; box-shadow: 0 4px 6px rgba(76, 175, 80, 0.2); }
    #startBtn:hover:not(:disabled) { background-color: #45a049; }
    #stopBtn { background-color: #f44336; color: white; box-shadow: 0 4px 6px rgba(244, 67, 54, 0.2); }
    #stopBtn:hover:not(:disabled) { background-color: #da190b; }
    button:disabled { background-color: #cccccc; color: #888; cursor: not-allowed; box-shadow: none; }
    
    .status-container {
      margin-top: 20px;
      padding: 10px;
      background-color: #fff;
      border-radius: 6px;
      border: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    #status-text {
      font-size: 14px;
      font-weight: 500;
      color: #555;
    }

    .indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: #ccc;
    }

    .indicator.listening {
      background-color: #4CAF50;
      animation: pulse 1.5s infinite;
    }

    .indicator.disconnected {
      background-color: #f44336;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7);
      }
      70% {
        transform: scale(1.1);
        box-shadow: 0 0 0 10px rgba(76, 175, 80, 0);
      }
      100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(76, 175, 80, 0);
      }
    }
  </style>
</head>
<body>
  <h3>ERP Autopilot 🤖</h3>
  <p class="subtitle">Your AI Voice Assistant</p>
  
  <button id="startBtn">Start Copilot</button>
  <button id="stopBtn" disabled>Stop</button>
  
  <div class="status-container">
    <div id="status-indicator" class="indicator disconnected"></div>
    <div id="status-text">Disconnected</div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
